    <!-- Twitter -->

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Single non-blocking font request with minimal weights. Boot shell uses system fonts. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&family=Heebo:wght@400;500;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&family=Heebo:wght@400;500;700&display=swap" /></noscript>

    <!-- Critical inline CSS — renders hero IMMEDIATELY before bundle loads -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0;background:#0a1628;color:#fff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      body{font-family:'Plus Jakarta Sans','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
      /* Hide React tree until the main stylesheet has applied to avoid
         flash of unstyled content while the boot shell is visible */
      #root{opacity:0;transition:opacity .25s ease}
      html[data-css-ready="true"] #root{opacity:1}
      #root:empty::before{
        content:"";
        display:block;
        position:fixed;inset:0;
        background:linear-gradient(180deg,#0a1628 0%,#0f2844 40%,#132d4f 70%,#0d2240 100%);
        z-index:0;
      }
      .boot-shell{
        position:fixed;inset:0;z-index:1;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        padding:0 1rem;text-align:center;
        background:linear-gradient(180deg,#0a1628 0%,#0f2844 40%,#132d4f 70%,#0d2240 100%);
        opacity:1;transition:opacity .4s ease;pointer-events:none;
      }
      .boot-shell[data-hidden="true"]{opacity:0}
      .boot-badge{
        display:inline-flex;align-items:center;padding:6px 16px;
        border-radius:9999px;font-size:12px;font-weight:500;letter-spacing:0.025em;
        background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
        color:#7db8e0;margin-bottom:24px;backdrop-filter:blur(8px);
      }
      .boot-title{
        font-size:clamp(2.5rem,7vw,5rem);font-weight:800;
        line-height:1.05;letter-spacing:-0.02em;margin:0 0 24px;
        color:#fff;max-width:900px;
      }
      .boot-title-accent{
        background:linear-gradient(to right,#7db8e0,#5ba3d9,#93c5e8);
        -webkit-background-clip:text;background-clip:text;
        -webkit-text-fill-color:transparent;
        display:block;
      }
      .boot-sub{
        font-size:clamp(1rem,2.2vw,1.25rem);color:#94a3b8;
        max-width:620px;margin:0 0 48px;line-height:1.6;
      }
      .boot-pulse{
        width:120px;height:2px;border-radius:2px;
        background:linear-gradient(90deg,transparent,#7db8e0,transparent);
        background-size:200% 100%;
        animation:boot-slide 1.4s ease-in-out infinite;
      }
      @keyframes boot-slide{
        0%{background-position:100% 0}
        100%{background-position:-100% 0}
      }
      @media (prefers-reduced-motion:reduce){
        .boot-pulse{animation:none;opacity:.5}
        .boot-shell{transition:none}
      }
    </style>

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "82Labs",
      "url": "https://www.82labs.io",
      "logo": "https://www.82labs.io/favicon.png",
      "description": "Official n8n Partners. Intelligent automation and fullstack systems studio.",
      "email": "info@82labs.io",
      "areaServed": "Worldwide",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Haifa",
        "addressCountry": "IL"
      },
      "sameAs": [
        "https://linkedin.com/company/82labs",
        "https://github.com/idan82labs"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Boot shell: instant branded content while bundle loads -->
    <div class="boot-shell" id="boot-shell" aria-hidden="true">
      <span class="boot-badge">Official n8n Partners</span>
      <h1 class="boot-title">
        We automate
        <span class="boot-title-accent">the messy parts.</span>
      </h1>
      <p class="boot-sub">
        n8n experts and fullstack engineers who turn complex business workflows into systems that run themselves.
      </p>
      <div class="boot-pulse" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
